<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback – Philly Hype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #FAF4EB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 32px;
            font-size: 14px;
            color: #CC0000;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666666;
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            padding: 16px 24px;
            background: #CC0000;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .link-btn:hover {
            background: #B30000;
            transform: translateY(-2px);
        }

        .link-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <h1>Customer Feedback</h1>
        <p class="subtitle">See what our customers are saying</p>
        <div class="links">
            <a href="https://www.grailed.com/phillyhype22/feedback" class="link-btn">Customer Feedback – Grailed</a>
            <a href="https://www.instagram.com/p/C1xYTjcp6HT/" class="link-btn">Customer Feedback – Instagram</a>
        </div>
    </div>
</body>
</html>
