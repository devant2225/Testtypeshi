<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philly Hype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #FAF4EB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #CC0000;
            border-radius: 8px;
            flex-shrink: 0;
        }
        
        .logo img {
            max-width: 85px;
            max-height: 85px;
            width: auto;
            height: auto;
            display: block;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        
        .tagline {
            font-size: 14px;
            color: #666666;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .mission {
            font-size: 14px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            padding: 0 8px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .link-btn {
            display: block;
            padding: 16px 24px;
            background: #CC0000;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        
        .link-btn:hover {
            background: #B30000;
            transform: translateY(-2px);
        }
        
        .link-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
            }
            
            .logo {
                width: 72px;
                height: 72px;
                margin-bottom: 24px;
            }
            
            .link-btn {
                padding: 14px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="Philly Hype Logo">
        </div>
        <h1>Philly Hype</h1>
        <p class="tagline">Hype that gives back</p>
        <p class="mission">We're a streetwear brand that donates 30% of profits to Philly-based nonprofits. When you buy with us, you're giving back to the community that built us. 🤲🏽</p>
        
        <div class="links">
            <a href="https://philly-hype.myshopify.com/" class="link-btn">Shop</a>
            <a href="https://instagram.com/_phillyhype" class="link-btn">Instagram</a>
            <a href="https://www.tiktok.com/@_phillyhype" class="link-btn">TikTok</a>
            <a href="https://www.youtube.com/@Philly-Hype" class="link-btn">YouTube</a>
        </div>
    </div>
</body>
</html>
